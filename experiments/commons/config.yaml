# Shared configuration for all experiments.
# One seed to rule them all — every experiment reads from here.

seed: 42

# Fraction of CPU cores to use for parallel jobs (0.0–1.0)
cpu_fraction: 0.9

datasets:
  - nsl-kdd
  - cic-ids-2017
  - unsw-nb15
  - cse-cic-ids2018

data:
  data_root: /home/resbears/Downloads/data
  test_size: 0.2
  val_split: 0.1
  apply_smote: true

models:
  dnn:
    hidden_layers: [1024, 768, 512]
    dropout_rate: 0.01
    learning_rate: 0.01
    batch_size: 8192
    epochs: 100
    early_stopping_patience: 10
  rf:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
    criterion: gini
    n_jobs: -1
  xgb:
    n_estimators: 300
    max_depth: 8
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1
    tree_method: hist
    device: cuda
  cnn_lstm:
    grid_size: 11
    hidden_size: 128
    num_lstm_layers: 1
    dropout: 0.5
    learning_rate: 0.001
    batch_size: 4096
    epochs: 100
    early_stopping_patience: 10
  cnn_gru:
    input_channels: 1
    cnn_filters: 64
    cnn_kernel_size: 3
    pool_kernel_size: 2
    cnn_dropout: 0.5
    gru_hidden_size: 75
    gru_num_layers: 1
    gru_dropout: 0.5
    gru_input_size: 1
    fc_hidden_size: 128
    input_spatial_size: 11
    seq_len: 121
    learning_rate: 0.001
    batch_size: 4096
    epochs: 100
    early_stopping_patience: 10

explainer:
  shap_background_samples: 100
  lime_num_features: 10
  lime_num_samples: 2000
  ig_n_steps: 50
  ig_internal_batch_size: 8192
  num_explain_samples: 10000

experiment_1:
  output_dir: experiments/1/results
  models_dir: experiments/1/results

experiment_2:
  output_dir: experiments/2/results
  exp1_results_dir: experiments/1/results

  attack:
    fgsm_epsilons: [0.01, 0.05, 0.1, 0.2, 0.3]
    pgd_epsilons: [0.01, 0.05, 0.1]
    pgd_num_steps: 20
    pgd_step_size_factor: 2.5
    num_attack_samples: 1000
    attack_batch_size: 4096
    run_constrained: true
    run_unconstrained: true

  scaffolding:
    ood_z_threshold: 3.0
    ood_ratio_threshold: 0.3
    num_eval_samples: 500
    biased_model_hidden: [64, 32]
    biased_model_epochs: 50
    biased_model_lr: 0.01
    lime_num_samples: 5000
    lime_num_features: 10
    shap_background_samples: 100
    scaffolding_datasets: [nsl-kdd, cic-ids-2017]

  robustness:
    num_samples: 1000
    explanation_methods: [SHAP, LIME, IG, DeepLIFT]
    pa_explanation_methods: [PA-SHAP, PA-LIME, PA-IG, PA-DeepLIFT]
    distance_norm: l2
    explanation_similarity_epsilon: 0.1
    shap_background_samples: 100
    lime_num_samples: 5000
    lime_num_features: 10
    ig_n_steps: 50
    ig_internal_batch_size: 4096

experiment_3:
  output_dir: experiments/3/results
  xai_modes:
    - normal
    - pa

  consensus:
    top_k_values: [5, 10]
    alpha: 0.05
    num_explain_samples: 10000

  interactions:
    top_n_interactions: 20
    shap_interaction_samples: 500
    shap_background_samples: 100

  alignment:
    enabled: true
    top_k_rra: [5, 10, 15]

  parallelism:
    max_dataset_workers: 4
    max_consensus_workers: 16
    max_plot_workers: 8
    num_gpu_devices: 2

experiment_4:
  output_dir: experiments/4/results
  exp1_output_dir: experiments/1/results
  xai_modes:
    - normal
    - pa

  cnn:
    channels: [64, 128, 64]
    kernel_size: 3
    dropout_rate: 0.1
    learning_rate: 0.001
    batch_size: 8192
    epochs: 100
    early_stopping_patience: 10
  svm:
    kernel: rbf
    C: 1.0
    gamma: scale
    max_iter: 5000
    probability: true
    max_train_samples: null

  statistical:
    pca_variance_threshold: 0.95
    spearman_threshold: 0.8
    info_gain_top_k: 20

  xai:
    f1_degradation_threshold: 0.01
    min_features: 5
    pruning_step_ratio: 0.1
    target_features:
      nsl-kdd: 19
      cic-ids-2017: 15
      unsw-nb15: 15
      cse-cic-ids2018: 15

  parallelism:
    num_gpu_devices: 2
